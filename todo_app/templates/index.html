<!DOCTYPE html>
<html>
<head>
    <title>Список дел</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f0f0f0;  /* Светло-серый фон */
        }
        h1 {
            color: blue;  /* Синий заголовок */
        }
        .done {
            text-decoration: line-through;
            color: gray;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .task-date {
            font-size: 12px;
            color: gray;
        }
        a {
            text-decoration: none;
            color: red;
            margin-left: 15px;
        }
        .clear-btn {
            background-color: #dc3545;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .clear-btn:hover {
            background-color: #c82333;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            width: 250px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Мои задачи</h1>
    
    <ul>
        {% for task in tasks %}
        <li>
            <div class="task-info">
                <span>{{ task.title }}</span>
                <span class="task-date">{{ task.created_at }}</span>
            </div>
            <a href="/delete/{{ loop.index0 }}">Удалить</a>
        </li>
        {% endfor %}
    </ul>

    <h2>Добавить задачу</h2>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="Новая задача" required>
        <button type="submit">Добавить</button>
    </form>

    <br>
    <form action="/clear-all">
        <button type="submit" class="clear-btn">Очистить всё</button>
    </form>
</body>
</html>
